<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#090d1a"/>
      <stop offset="100%" style="stop-color:#0c1220"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.4"/>
    </linearGradient>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Sfondo quadrato arrotondato -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Alone interno -->
  <circle cx="256" cy="220" r="200" fill="#1a2f55" opacity="0.4" filter="url(#glow-soft)"/>

  <!-- Anello esterno decorativo -->
  <circle cx="256" cy="256" r="178" fill="none" stroke="url(#ring)" stroke-width="1" opacity="0.35"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="url(#ring)" stroke-width="0.5" opacity="0.2"/>

  <!-- ── Rete neurale / logo mark ──────────────────────── -->
  <!-- Nodo centrale grande -->
  <circle cx="256" cy="252" r="28" fill="url(#icon-grad)" opacity="0.95"/>
  <!-- Alone del nodo centrale -->
  <circle cx="256" cy="252" r="42" fill="url(#icon-grad)" opacity="0.08"/>

  <!-- 6 nodi satellite -->
  <!-- Alto -->
  <circle cx="256" cy="148" r="16" fill="#3b82f6" opacity="0.9"/>
  <!-- Alto-destra -->
  <circle cx="348" cy="180" r="14" fill="#06b6d4" opacity="0.85"/>
  <!-- Basso-destra -->
  <circle cx="352" cy="316" r="14" fill="#06b6d4" opacity="0.8"/>
  <!-- Basso -->
  <circle cx="256" cy="358" r="16" fill="#7dd3fc" opacity="0.85"/>
  <!-- Basso-sinistra -->
  <circle cx="162" cy="316" r="14" fill="#3b82f6" opacity="0.8"/>
  <!-- Alto-sinistra -->
  <circle cx="164" cy="180" r="14" fill="#06b6d4" opacity="0.85"/>

  <!-- Connessioni dal centro -->
  <line x1="256" y1="252" x2="256" y2="164" stroke="#3b82f6" stroke-width="3" opacity="0.55"/>
  <line x1="256" y1="252" x2="338" y2="190" stroke="#06b6d4" stroke-width="3" opacity="0.55"/>
  <line x1="256" y1="252" x2="342" y2="308" stroke="#06b6d4" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="252" x2="256" y2="342" stroke="#7dd3fc" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="252" x2="172" y2="308" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
  <line x1="256" y1="252" x2="174" y2="190" stroke="#06b6d4" stroke-width="3" opacity="0.55"/>

  <!-- Connessioni tra satelliti (poligono) -->
  <polygon points="256,148 348,180 352,316 256,358 162,316 164,180"
           fill="none" stroke="#1e3a5f" stroke-width="1.5" opacity="0.5"/>

  <!-- ── Wordmark sotto ─────────────────────────────────── -->
  <text x="256" y="446" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="52" font-weight="700" letter-spacing="-2"
        fill="#f0f4ff">WorkAI</text>
  <text x="398" y="446" text-anchor="start"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="52" font-weight="300" letter-spacing="-1"
        fill="#06b6d4" opacity="0.9"> OS</text>
</svg>
