<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#090d1a"/>
      <stop offset="100%" style="stop-color:#0b0f1f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.06"/>
    </linearGradient>
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#cadcfc"/>
    </linearGradient>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Sfondo -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Alone di luce in alto a destra -->
  <ellipse cx="980" cy="120" rx="360" ry="280" fill="#1e3a5f" opacity="0.55" filter="url(#soft-glow)"/>

  <!-- Alone secondario in basso a sinistra -->
  <ellipse cx="140" cy="520" rx="260" ry="200" fill="#0e2a4a" opacity="0.45" filter="url(#soft-glow)"/>

  <!-- Griglia sottile di punti (texture) -->
  <g opacity="0.12">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="750" y1="0" x2="750" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
    <line x1="1050" y1="0" x2="1050" y2="630" stroke="#3b82f6" stroke-width="0.5"/>
  </g>

  <!-- ── LOGO MARK ─────────────────────────────────────── -->
  <!-- Esagono contenitore del logo -->
  <g transform="translate(82, 185)">
    <!-- Sfondo esagono -->
    <polygon points="52,0 104,30 104,90 52,120 0,90 0,30"
             fill="url(#icon-grad)" opacity="0.15" rx="8"/>
    <polygon points="52,3 101,30 101,87 52,117 3,87 3,30"
             fill="none" stroke="url(#icon-grad)" stroke-width="1.5" opacity="0.6"/>

    <!-- Icona cervello / nodi connessi — simbolo AI -->
    <!-- Nodo centrale -->
    <circle cx="52" cy="60" r="10" fill="url(#icon-grad)" opacity="0.95"/>
    <!-- Nodi satellite -->
    <circle cx="22" cy="38" r="6.5" fill="#3b82f6" opacity="0.85"/>
    <circle cx="82" cy="38" r="6.5" fill="#06b6d4" opacity="0.85"/>
    <circle cx="20" cy="82" r="6.5" fill="#06b6d4" opacity="0.75"/>
    <circle cx="84" cy="82" r="6.5" fill="#3b82f6" opacity="0.75"/>
    <circle cx="52" cy="24" r="5" fill="#7dd3fc" opacity="0.7"/>
    <circle cx="52" cy="96" r="5" fill="#7dd3fc" opacity="0.7"/>
    <!-- Connessioni -->
    <line x1="52" y1="60" x2="22" y2="38" stroke="#3b82f6" stroke-width="1.5" opacity="0.6"/>
    <line x1="52" y1="60" x2="82" y2="38" stroke="#06b6d4" stroke-width="1.5" opacity="0.6"/>
    <line x1="52" y1="60" x2="20" y2="82" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <line x1="52" y1="60" x2="84" y2="82" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
    <line x1="52" y1="60" x2="52" y2="24" stroke="#7dd3fc" stroke-width="1.5" opacity="0.5"/>
    <line x1="52" y1="60" x2="52" y2="96" stroke="#7dd3fc" stroke-width="1.5" opacity="0.5"/>
    <line x1="22" y1="38" x2="52" y2="24" stroke="#3b82f6" stroke-width="1" opacity="0.35"/>
    <line x1="82" y1="38" x2="52" y2="24" stroke="#06b6d4" stroke-width="1" opacity="0.35"/>
    <line x1="20" y1="82" x2="52" y2="96" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <line x1="84" y1="82" x2="52" y2="96" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- ── TESTO PRINCIPALE ───────────────────────────────── -->
  <!-- WorkAI -->
  <text x="210" y="263"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="108" font-weight="700" letter-spacing="-4"
        fill="url(#text-grad)">WorkAI</text>

  <!-- OS — in accent color -->
  <text x="762" y="263"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="108" font-weight="300" letter-spacing="-2"
        fill="#06b6d4" opacity="0.9">OS</text>

  <!-- Linea divisoria sottile -->
  <line x1="210" y1="286" x2="900" y2="286" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Tagline -->
  <text x="211" y="336"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="24" font-weight="400" letter-spacing="0.5"
        fill="#cadcfc" opacity="0.75">AI Coach per la produttività delle PMI italiane</text>

  <!-- ── PILLOLE ATTRIBUTI ───────────────────────────────── -->
  <!-- Pill 1 -->
  <rect x="210" y="378" width="148" height="34" rx="17"
        fill="#1e3a5f" opacity="0.7"/>
  <text x="284" y="401" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="14" font-weight="500" fill="#93c5fd">Conforme GDPR</text>

  <!-- Pill 2 -->
  <rect x="374" y="378" width="120" height="34" rx="17"
        fill="#1e3a5f" opacity="0.7"/>
  <text x="434" y="401" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="14" font-weight="500" fill="#93c5fd">Modulare</text>

  <!-- Pill 3 -->
  <rect x="510" y="378" width="166" height="34" rx="17"
        fill="#1e3a5f" opacity="0.7"/>
  <text x="593" y="401" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="14" font-weight="500" fill="#93c5fd">Privacy by design</text>

  <!-- Pill 4 -->
  <rect x="692" y="378" width="152" height="34" rx="17"
        fill="#1e3a5f" opacity="0.7"/>
  <text x="768" y="401" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="14" font-weight="500" fill="#93c5fd">Zero IT richiesto</text>

  <!-- ── KPI BOX a destra ────────────────────────────────── -->
  <!-- Card sfondo -->
  <rect x="960" y="170" width="190" height="290" rx="16"
        fill="#0f172a" stroke="#1e3a5f" stroke-width="1" opacity="0.95"/>

  <!-- KPI 1 -->
  <text x="1055" y="230" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="48" font-weight="700" letter-spacing="-2"
        fill="#06b6d4">45</text>
  <text x="1055" y="254" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="12" font-weight="400" fill="#64748b">min risparmio/giorno</text>

  <line x1="985" y1="274" x2="1135" y2="274" stroke="#1e3a5f" stroke-width="1"/>

  <!-- KPI 2 -->
  <text x="1055" y="324" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="48" font-weight="700" letter-spacing="-2"
        fill="#10b981">6</text>
  <text x="1055" y="348" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="12" font-weight="400" fill="#64748b">sett. break-even</text>

  <line x1="985" y1="368" x2="1135" y2="368" stroke="#1e3a5f" stroke-width="1"/>

  <!-- KPI 3 -->
  <text x="1055" y="416" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="48" font-weight="700" letter-spacing="-2"
        fill="#f59e0b">0</text>
  <text x="1055" y="440" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="12" font-weight="400" fill="#64748b">IT richiesto</text>

  <!-- ── FOOTER ─────────────────────────────────────────── -->
  <line x1="82" y1="530" x2="1118" y2="530" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Dot verde live -->
  <circle cx="99" cy="562" r="5" fill="#10b981"/>
  <text x="114" y="567"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="16" font-weight="400" fill="#475569">fernandocarta.it/workai-os</text>

  <!-- Fernando Carta a destra -->
  <text x="1118" y="567" text-anchor="end"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif"
        font-size="16" font-weight="500" fill="#475569">Fernando Carta — Business Technology Advisor</text>
</svg>
